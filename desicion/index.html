<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danna Camila Fierro Hermosillo</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 { 
            color: #333; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 50px; 
            font-size: 2.2rem;
            text-align: center;
        }

        .contenedor-botones {
            display: grid;
            /* Mantenemos 5 columnas, los sobrantes se acomodarán abajo */
            grid-template-columns: repeat(5, 1fr); 
            gap: 25px; 
            max-width: 1200px; 
            width: 100%;
            margin-bottom: 50px; 
        }

        .boton {
            background-color:#800020; 
            color: white;
            padding: 30px 15px; /* Reducido un poco para que quepan mejor los 13 */
            text-decoration: none;
            border-radius: 15px; 
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .boton:hover {
            background-color:#a00028; /* Un tono un poco más claro al pasar el mouse */
            transform: translateY(-5px);
        }

        .imagen-centrada {
            max-width: 80%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 5px solid white;
        }

        /* Ajustes para pantallas medianas */
        @media (max-width: 1024px) {
            .contenedor-botones { grid-template-columns: repeat(4, 1fr); }
        }

        /* Ajustes para celulares */
        @media (max-width: 768px) {
            .contenedor-botones { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
