    <title>Apartado - Danna Camila</title>
    <style>
        /* Estilo base igual al index */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            color: #333; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 20px;
        }

        /* Contenedor superior: Casita + Apartados */
        .navegacion-superior {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Reducido un poco para que quepan los 13 */
            max-width: 1200px;
            margin: 0 auto 30px;
            flex-wrap: wrap;
        }

        /* Estilo del icono de casa */
        .home-icon {
            background-color: #333; 
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .home-icon:hover {
            background-color: #000;
            transform: scale(1.1);
        }

        /* Botones de apartados pequeños arriba */
        .mini-boton {
            background-color: #800020;
            color: white;
            padding: 10px 12px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.75em;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .mini-boton:hover {
            background-color: #a00028;
            transform: translateY(-3px);
        }

        /* Caja de contenido abajo */
        .cajita-contenido {
            background-color: white;
            padding: 50px 20px;
            border-radius: 20px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            min-height: 200px;
        }

        h2 {
            color: #800020;
            margin-top: 0;
            text-transform: uppercase;
        }
    </style>
</head>
